spring:
  application:
    name: li_ai_code_mother
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/li_ai_code_mother
    username: root
    password: 123456
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api

#springdoc-openai
springdoc:
  group-configs:
    - group: 'default'
#      paths-to-match: '/**'
      packages-to-scan: com.example.li_ai_code_mother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

langchain4j:
  open-ai:
    chat-model:
      base-url: https://coding.dashscope.aliyuncs.com/v1
      api-key: sk-sp-3c8e6f0adf6f4261bf8879bfac0ec88a
      model-name: qwen3.5-plus
      max-tokens: 50000
      response_format: json_object
      strict-json-schema: true
      log-requests: true
      log-responses: true
