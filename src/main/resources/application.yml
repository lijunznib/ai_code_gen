spring:
  application:
    name: li_ai_code_mother
  #session配置
  session:
    store-type: redis
    #session 30 天过期
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/li_ai_code_mother
    username: root
    password: 123456
  #redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      ttl: 3600 #redis中key的过期时间（s）。
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always



#springdoc-openai
springdoc:
  group-configs:
    - group: 'default'
#      paths-to-match: '/**'
      packages-to-scan: com.example.li_ai_code_mother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn




